<svg width="420" height="170" viewBox="0 0 420 170" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Most Used Languages</title>
  <desc id="desc">Most used public repository languages by code size, with bars for Jupyter Notebook, TypeScript, JavaScript, Python, HTML, and other languages.</desc>
  <rect width="420" height="170" rx="10" fill="#1A1B27"/>
  <rect x="0.5" y="0.5" width="419" height="169" rx="9.5" stroke="#30364F"/>
  <text x="24" y="34" fill="#667EEA" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">Most Used Languages</text>
  <text x="24" y="56" fill="#9AA4C7" font-family="Segoe UI, Arial, sans-serif" font-size="12">Public repository code mix</text>

  <g font-family="Segoe UI, Arial, sans-serif" font-size="11">
    <text x="24" y="80" fill="#C9D1D9">Jupyter Notebook</text>
    <rect x="148" y="71" width="228" height="10" rx="5" fill="#2A2F45"/>
    <rect x="148" y="71" width="163" height="10" rx="5" fill="#DA5B0B"/>
    <text x="384" y="80" fill="#C9D1D9" text-anchor="end">71%</text>

    <text x="24" y="99" fill="#C9D1D9">TypeScript</text>
    <rect x="148" y="90" width="228" height="10" rx="5" fill="#2A2F45"/>
    <rect x="148" y="90" width="19" height="10" rx="5" fill="#3178C6"/>
    <text x="384" y="99" fill="#C9D1D9" text-anchor="end">8%</text>

    <text x="24" y="118" fill="#C9D1D9">JavaScript</text>
    <rect x="148" y="109" width="228" height="10" rx="5" fill="#2A2F45"/>
    <rect x="148" y="109" width="14" height="10" rx="5" fill="#F1E05A"/>
    <text x="384" y="118" fill="#C9D1D9" text-anchor="end">6%</text>

    <text x="24" y="137" fill="#C9D1D9">Python</text>
    <rect x="148" y="128" width="228" height="10" rx="5" fill="#2A2F45"/>
    <rect x="148" y="128" width="12" height="10" rx="5" fill="#3572A5"/>
    <text x="384" y="137" fill="#C9D1D9" text-anchor="end">5%</text>

    <text x="24" y="156" fill="#C9D1D9">HTML and other</text>
    <rect x="148" y="147" width="228" height="10" rx="5" fill="#2A2F45"/>
    <rect x="148" y="147" width="22" height="10" rx="5" fill="#E34C26"/>
    <text x="384" y="156" fill="#C9D1D9" text-anchor="end">10%</text>
  </g>
</svg>
